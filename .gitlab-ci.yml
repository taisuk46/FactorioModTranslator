stages:
  - build
  - deploy

# Windowsビルドジョブ
build_windows:
  stage: build
  tags:
    - windows  # Windows Runnerが必要です
  script:
    - npm install
    - npm run tauri build -- --bundles nsis
  artifacts:
    name: "FactorioModTranslator-win64"
    paths:
      - src-tauri/target/release/bundle/nsis/*.exe
    expire_in: 1 week
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_TAG

# リリース作成ジョブ（タグがプッシュされた時のみ実行）
release_job:
  stage: deploy
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  rules:
    - if: $CI_COMMIT_TAG
  script:
    - echo "Creating release for $CI_COMMIT_TAG"
  release:
    name: "Release $CI_COMMIT_TAG"
    description: "Automated release from GitLab CI/CD"
    tag_name: "$CI_COMMIT_TAG"
    assets:
      links:
        - name: "Windows Installer (.exe)"
          # アーティファクトへの直接リンク（ジョブ名が必要）
          url: "${CI_PROJECT_URL}/-/jobs/artifacts/${CI_COMMIT_TAG}/raw/src-tauri/target/release/bundle/nsis/FactorioModTranslator_${CI_COMMIT_TAG}_x64-setup.exe?job=build_windows"

