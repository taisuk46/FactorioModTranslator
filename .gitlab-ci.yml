stages:
  - build
  - deploy

# Windowsビルドジョブ
build_windows:
  stage: build
  tags:
    - saas-windows-medium-amd64  # GitLab SaaSの共有Windows Runner
  before_script:
    - If (!(Get-Command "node" -ErrorAction SilentlyContinue)) { choco install nodejs -y }
    - If (!(Get-Command "rustc" -ErrorAction SilentlyContinue)) { choco install rustp -y; $env:Path += ";$env:USERPROFILE\.cargo\bin" }
    - If (!(Get-Command "npm" -ErrorAction SilentlyContinue)) { choco install npm -y }
  script:
    - npm install
    - npm run tauri build -- --bundles nsis
  artifacts:
    name: "FactorioModTranslator-win64"
    paths:
      - src-tauri/target/release/bundle/nsis/*.exe
    expire_in: 1 week
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_TAG

# リリース作成ジョブ（タグがプッシュされた時のみ実行）
# このジョブは標準のLinux Shared Runnerで実行されます
release_job:
  stage: deploy
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  rules:
    - if: $CI_COMMIT_TAG
  script:
    - echo "Creating release for $CI_COMMIT_TAG"
  release:
    name: "Release $CI_COMMIT_TAG"
    description: "Automated release from GitLab CI/CD"
    tag_name: "$CI_COMMIT_TAG"
    assets:
      links:
        - name: "Windows Installer (.exe)"
          url: "${CI_PROJECT_URL}/-/jobs/artifacts/${CI_COMMIT_TAG}/raw/src-tauri/target/release/bundle/nsis/FactorioModTranslator_${CI_COMMIT_TAG}_x64-setup.exe?job=build_windows"


