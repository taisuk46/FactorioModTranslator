stages:
  - build
  - deploy

# Windowsビルドジョブ
build_windows:
  stage: build
  tags:
    - saas-windows-medium-amd64  # GitLab SaaSの共有Windows Runner
  before_script:
    # Node.jsの確認とインストール
    - If (!(Get-Command "node" -ErrorAction SilentlyContinue)) { choco install nodejs -y }
    
    # Rustの確認とインストール
    - |
      If (!(Get-Command "cargo" -ErrorAction SilentlyContinue)) {
        Write-Host "Installing Rust..."
        # rustup-initをダウンロードして実行
        Invoke-WebRequest -Uri "https://win.rustup.rs/x86_64" -OutFile "rustup-init.exe"
        .\rustup-init.exe -y --default-toolchain stable --profile minimal
      }
      # インストール直後でもパスが通るように環境変数を手動で更新
      $env:Path += ";$env:USERPROFILE\.cargo\bin"
    
    # バージョン確認
    - node -v
    - npm -v
    - cargo --version
  script:
    - npm install
    - npm run tauri build -- --bundles nsis
  artifacts:
    name: "FactorioModTranslator-win64"
    paths:
      - src-tauri/target/release/bundle/nsis/*.exe
      # 必要な成果物があればここに追加
    expire_in: 1 week
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_TAG

# GitHubへの同期とリリース作成ジョブ
github_sync_and_release:
  stage: deploy
  image: alpine:latest
  rules:
    # vから始まるタグ（例: v1.0.0）がプッシュされた時のみ実行
    - if: '$CI_COMMIT_TAG =~ /^v.*$/'
  before_script:
    - apk add --no-cache git github-cli zip
  script:
    # 1. GitHubへのGit同期
    - git config --global user.email "gitlab-ci@example.com"
    - git config --global user.name "GitLab CI"
    # GitのURLにトークンを埋め込んで認証
    - git remote add github "https://${GITHUB_USER}:${GITHUB_TOKEN}@github.com/${GITHUB_USER}/${GITHUB_REPO}.git"
    
    # GitLabのコードとタグをGitHubに強制プッシュ
    - git push github HEAD:refs/heads/main --force
    - git push github $CI_COMMIT_TAG
    
    # 2. リリース用アーカイブの作成 (docsフォルダ以外)
    - zip -r source_without_docs.zip . -x "docs/*" -x "docs/**/*" -x ".git/*"
    
    # 3. GitHubへのリリース作成 (gh CLI)
    - echo "${GITHUB_TOKEN}" | gh auth login --with-token
    - gh release create "$CI_COMMIT_TAG" src-tauri/target/release/bundle/nsis/*.exe source_without_docs.zip --title "$CI_COMMIT_TAG" --repo "${GITHUB_USER}/${GITHUB_REPO}" --notes "Automated release from GitLab CI/CD"
