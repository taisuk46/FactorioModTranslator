stages:
  - build
  - deploy

# Windowsビルドジョブ
build_windows:
  stage: build
  tags:
    - saas-windows-medium-amd64  # GitLab SaaSの共有Windows Runner
  before_script:
    # Node.jsの確認とインストール
    - If (!(Get-Command "node" -ErrorAction SilentlyContinue)) { choco install nodejs -y }
    
    # Rustの確認とインストール
    - |
      If (!(Get-Command "cargo" -ErrorAction SilentlyContinue)) {
        Write-Host "Installing Rust..."
        # rustup-initをダウンロードして実行
        Invoke-WebRequest -Uri "https://win.rustup.rs/x86_64" -OutFile "rustup-init.exe"
        .\rustup-init.exe -y --default-toolchain stable --profile minimal
      }
      # インストール直後でもパスが通るように環境変数を手動で更新
      $env:Path += ";$env:USERPROFILE\.cargo\bin"
    
    # バージョン確認
    - node -v
    - npm -v
    - cargo --version
  script:
    - npm install
    - npm run tauri build -- --bundles nsis
  artifacts:
    name: "FactorioModTranslator-win64"
    paths:
      - src-tauri/target/release/bundle/nsis/*.exe
    expire_in: 1 week
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_TAG

# リリース作成ジョブ（タグがプッシュされた時のみ実行）
release_job:
  stage: deploy
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  rules:
    - if: $CI_COMMIT_TAG
  script:
    - echo "Creating release for $CI_COMMIT_TAG"
  release:
    name: "Release $CI_COMMIT_TAG"
    description: "Automated release from GitLab CI/CD"
    tag_name: "$CI_COMMIT_TAG"
    assets:
      links:
        - name: "Windows Installer (.exe)"
          url: "${CI_PROJECT_URL}/-/jobs/artifacts/${CI_COMMIT_TAG}/raw/src-tauri/target/release/bundle/nsis/FactorioModTranslator_${CI_COMMIT_TAG}_x64-setup.exe?job=build_windows"



